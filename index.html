<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStudios | Official Site</title>
    <style>
        /* --- DESIGN THEME --- */
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --secondary: #1a1a1a;
            --text-gray: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { 
            font-size: 1.2rem; 
            font-weight: 800; 
            letter-spacing: 4px; 
            text-transform: uppercase;
        }

        .nav-links button {
            background: none;
            border: none;
            color: var(--text-gray);
            margin-left: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links button:hover, .nav-links button.active {
            color: var(--accent);
        }

        /* --- PAGES (TABS) --- */
        .page {
            display: none;
            min-height: 100vh;
            padding-top: 100px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active-page { display: block; }

        /* --- HOME DESIGN --- */
        #home {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .since-tag {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--text-gray);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #home h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 15px;
        }

        #home p {
            color: var(--text-gray);
            max-width: 500px;
            font-size: 1.1rem;
        }

        /* --- PROJECTS DESIGN --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-slate {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 80px 40px;
            border-radius: 4px;
            margin-top: 40px;
        }

        /* --- CONTACT & SOCIALS --- */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            text-align: left;
            margin-top: 50px;
        }

        .social-card {
            background: var(--secondary);
            padding: 30px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .social-card:hover {
            border-color: var(--accent);
            background: #222;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 4px;
        }

        .submit-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #ccc; }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 768px) {
            nav { padding: 20px; flex-direction: column; }
            .nav-links { margin-top: 15px; }
            .nav-links button { margin: 0 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EcoStudios</div>
        <div class="nav-links">
            <button onclick="switchTab('home')" id="nav-home" class="active">Studio</button>
            <button onclick="switchTab('projects')" id="nav-projects">Slate</button>
            <button onclick="switchTab('contact')" id="nav-contact">Connect</button>
        </div>
    </nav>

    <section id="home" class="page active-page">
        <div class="since-tag">Since June 6th 2024</div>
        <h1>EcoStudios</h1>
        <p>Premium visual storytelling and film production.</p>
    </section>

    <section id="projects" class="page">
        <div class="container">
            <h2 style="font-size: 2.5rem;">The Slate</h2>
            <div class="empty-slate">
                <h3 style="margin-bottom: 10px;">In Development</h3>
                <p style="color: var(--text-gray);">Our current projects are strictly confidential.<br>Check back later for trailers and announcements.</p>
            </div>
        </div>
    </section>

    <section id="contact" class="page">
        <div class="container">
            <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Contact</h2>
            <p style="color: var(--text-gray);">For all business and press inquiries.</p>

            <div class="contact-grid">
                <div>
                    <a href="https://www.youtube.com/@ecostudiosofficial" target="_blank" class="social-link">
                        <div class="social-card">
                            <span>YouTube</span>
                            <span>→</span>
                        </div>
                    </a>
                    <a href="https://www.instagram.com/ecostudiosofficial/" target="_blank" class="social-link">
                        <div class="social-card">
                            <span>Instagram</span>
                            <span>→</span>
                        </div>
                    </a>
                </div>

                <div>
                    <form>
                        <input type="text" placeholder="Full Name">
                        <input type="email" placeholder="Email Address">
                        <textarea rows="4" placeholder="Message"></textarea>
                        <button type="button" class="submit-btn">Send Inquiry</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script>
        function switchTab(tabId) {
            // Remove active class from all pages
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active-page'));

            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.nav-links button');
            buttons.forEach(b => b.classList.remove('active'));

            // Add active class to selected
            document.getElementById(tabId).classList.add('active-page');
            document.getElementById('nav-' + tabId).classList.add('active');

            // Scroll to top when switching
            window.scrollTo(0,0);
        }
    </script>

</body>
</html>
