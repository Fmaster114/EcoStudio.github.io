<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoStudios | Official Site</title>
    <style>
        /* --- DESIGN THEME --- */
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text-gray: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container img {
            height: 50px; /* Adjust height based on your preference */
            width: auto;
            display: block;
        }

        .nav-links button {
            background: none;
            border: none;
            color: var(--text-gray);
            margin-left: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            padding: 5px 0;
        }

        .nav-links button:hover, .nav-links button.active {
            color: var(--accent);
            border-bottom: 2px solid white;
        }

        /* --- TAB LOGIC --- */
        .page {
            display: none; /* Hide pages by default */
            min-height: 100vh;
            padding-top: 120px;
            animation: fadeIn 0.5s ease;
        }

        .active-page {
            display: block; /* Show active page */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- CONTENT STYLES --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .since-tag {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-gray);
            margin-bottom: 10px;
            display: block;
        }

        h1 { font-size: 3.5rem; margin-bottom: 20px; }

        .info-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 60px 20px;
            margin-top: 30px;
            border-radius: 8px;
        }

        /* --- CONTACT & SOCIALS --- */
        .social-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-btn {
            background: white;
            color: black;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s;
        }

        .social-btn:hover { opacity: 0.8; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
        }

        .submit-btn {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 12px 30px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .submit-btn:hover { background: white; color: black; }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .nav-links button { margin-left: 15px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img src="Logo.png" alt="EcoStudios Logo">
        </div>
        <div class="nav-links">
            <button onclick="showTab('home')" id="btn-home" class="active">Home</button>
            <button onclick="showTab('projects')" id="btn-projects">Projects</button>
            <button onclick="showTab('contact')" id="btn-contact">Contact</button>
        </div>
    </nav>

    <div id="home" class="page active-page">
        <div class="container">
            <span class="since-tag">EST. JUNE 6, 2024</span>
            <h1>EcoStudios</h1>
            <p style="color: var(--text-gray); font-size: 1.2rem;">Independent Film & Media Production House.</p>
        </div>
    </div>

    <div id="projects" class="page">
        <div class="container">
            <h2>The Slate</h2>
            <div class="info-card">
                <h3>Currently in Development</h3>
                <p style="color: var(--text-gray); margin-top: 15px;">We have no active public projects at this time. <br> Private screenings and developments are strictly confidential.</p>
            </div>
        </div>
    </div>

    <div id="contact" class="page">
        <div class="container">
            <h2 style="margin-bottom: 30px;">Connect</h2>
            
            <div class="social-box">
                <a href="https://www.youtube.com/@ecostudiosofficial" target="_blank" class="social-btn">YouTube</a>
                <a href="https://www.instagram.com/ecostudiosofficial/" target="_blank" class="social-btn">Instagram</a>
            </div>

            <div style="max-width: 500px; margin: 0 auto; text-align: left;">
                <form>
                    <input type="text" placeholder="Name">
                    <input type="email" placeholder="Email Address">
                    <textarea rows="4" placeholder="How can we help?"></textarea>
                    <button type="button" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabId) {
            // 1. Hide all pages
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active-page'));

            // 2. Deactivate all buttons
            const buttons = document.querySelectorAll('.nav-links button');
            buttons.forEach(btn => btn.classList.remove('active'));

            // 3. Show the selected page and activate button
            document.getElementById(tabId).classList.add('active-page');
            document.getElementById('btn-' + tabId).classList.add('active');

            // 4. Smoothly scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
